<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Theme Switcher</title>
    <!-- Link to your styles.css file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>CSS-Only Theme Switcher</h1>
        
        <!-- The theme toggle controls -->
        <div class="theme-switcher">
            <input type="radio" id="mode_light" name="theme" checked>
            <label for="mode_light">☀️ Light Mode</label>

            <input type="radio" id="mode_dark" name="theme">
            <label for="mode_dark">🌙 Dark Mode</label>
        </div>
    </header>

    <main>
        <section>
            <h2>Dynamic Content Area</h2>
            <p>This paragraph dynamically changes color based on the selected theme above!</p>
            <p>No JavaScript is required. The browser uses the CSS :has() pseudo-class to look at the checked state of the radio inputs and updates the page variables instantly.</p>
        </section>
    </main>

</body>
</html>
