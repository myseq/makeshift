<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="styles.css">
    <meta http-equiv="refresh" content="3;url=/default.html">
    <title>BeZard</title>
    <script>
        // JavaScript to handle countdown
        document.addEventListener("DOMContentLoaded", function() {
            let countdown = 3; // Start countdown from 3 seconds
            const countdownElement = document.getElementById("countdown");

            // Update the countdown every second
            const interval = setInterval(() => {
                countdown--;
                countdownElement.textContent = countdown;

                // Stop the interval once it reaches 0
                if (countdown <= 0) {
                    clearInterval(interval);
                }
            }, 1000);
        });
    </script>
</head>
<body>
    <h1>Redirecting in <i><span id="countdown">3</span> seconds...</i></h1>
    <div align="left" class="bordered-div">
    <!--#config timefmt="%A, %d-%b-%Y %H:%M:%S %Z" -->

    <br>% ip show addr : <!--#echo var="REMOTE_ADDR" -->
    <br>% date : <!--#echo var="DATE_LOCAL" -->
    </p>
    </div>
</body>
</html>
