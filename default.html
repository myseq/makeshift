<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍑🫐☕</title>
    <style>
        body {
            font-family: Verdana, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #222;
            color: white;
        }
        #status {
            padding: 20px;
            border-radius: 8px;
            background: #222;
            border: 1px solid #444;
        }
        .active { color: #FFBF00; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status">
        Status: <span id="lock-state">💤 </span>
    </div>
    <center><i>
    <b><p>Burning the candle at both ends</p></b>
    <p>or</p>
    <p>Catching forty winks!!</p>    
    </i></center>

    <script>
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.title = "☕";
                document.getElementById('lock-state').textContent = "Active ☕ (coffee)";
                document.getElementById('lock-state').className = "active";
                
                wakeLock.addEventListener('release', () => {
                    document.title = "💤";
                    document.getElementById('lock-state').textContent = "Inactive 💤 (ZZZ)";
                    document.getElementById('lock-state').className = "";
                });
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }

        // Request lock on page load
        requestWakeLock();

        // Re-request if user switches back to the tab
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });
    </script>
</body>
</html>
